<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configure Report Builder</title>
  <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.10.0.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .page {
      padding: 24px;
      max-width: 980px;
      margin: 0 auto;
    }
    .header {
      margin-bottom: 18px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #64748b;
    }
    .panel {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .field {
      display: grid;
      gap: 6px;
    }
    .field label {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
    }
    .field input,
    .field select {
      height: 40px;
      border: 1px solid #d6dee8;
      border-radius: 10px;
      padding: 0 12px;
      background: #fff;
      width: 100%;
    }
    .button-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-secondary {
      background: #eef2f7;
      color: #0f172a;
    }
    .btn-primary {
      background: linear-gradient(180deg, #24c5c0 0%, #16b3ad 100%);
      color: #fff;
    }
    .card {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      background: #fbfdff;
      margin-bottom: 12px;
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
    }
    .helper {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }
    .danger {
      background: #fee2e2;
      color: #991b1b;
    }
    .empty {
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">Configure Information Panel</div>
      <div class="subtitle">Add calculation cards such as Max Sales Date, Total Revenue, or Average Profit.</div>
    </div>

    <div class="panel">
      <div class="grid">
        <div class="field">
          <label for="label">Card Label</label>
          <input id="label" type="text" placeholder="e.g. Max Sales Date" />
        </div>

        <div class="field">
          <label for="worksheet">Data Source / Worksheet</label>
          <select id="worksheet"></select>
        </div>

        <div class="field">
          <label for="aggregation">Calculation</label>
          <select id="aggregation">
            <option value="MAX">MAX</option>
            <option value="MIN">MIN</option>
            <option value="SUM">SUM</option>
            <option value="AVG">AVG</option>
            <option value="COUNT">COUNT</option>
          </select>
        </div>

        <div class="field">
          <label for="field">Field</label>
          <select id="field"></select>
        </div>

        <div class="field">
          <label for="format">Display Format</label>
          <select id="format">
            <option value="text">Text</option>
            <option value="date">Date</option>
            <option value="number">Number</option>
            <option value="currency">Currency</option>
          </select>
        </div>
      </div>

      <div class="helper">
        Example: label = “Max Sales Date”, worksheet = “Data Source 1”, calculation = MAX, field = “Sales Date”, format = Date.
      </div>

      <div class="button-row">
        <button id="addCalc" class="btn-primary" type="button">Add Calculation</button>
      </div>
    </div>

    <div class="panel">
      <div class="card-title" style="margin-bottom: 12px;">Configured Cards</div>
      <div id="calcList" class="empty">No calculations added yet.</div>
    </div>

    <div class="button-row">
      <button id="cancelBtn" class="btn-secondary" type="button">Cancel</button>
      <button id="saveBtn" class="btn-primary" type="button">Save</button>
    </div>
  </div>

  <script src="./configure.js"></script>
</body>
</html>
